name: Deploy to Vercel

on:
  push:
    branches:
      - "**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      target:
        description: Vercel deployment target
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

concurrency:
  group: vercel-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment:
      name: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')) && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Determine deployment target
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
            echo "vercel_environment=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.target }}" == "production" ]]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
            echo "vercel_environment=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "name=preview" >> "$GITHUB_OUTPUT"
            echo "vercel_environment=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Vercel secrets
        run: |
          missing=()
          for secret_name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [[ -z "${!secret_name}" ]]; then
              missing+=("$secret_name")
            fi
          done

          if (( ${#missing[@]} )); then
            printf 'Missing required deployment secret(s): %s\n' "${missing[*]}"
            printf 'Add them in GitHub repository settings before running this workflow.\n'
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Verify build
        run: npm run build

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=${{ steps.target.outputs.vercel_environment }} --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        run: npx vercel build ${{ steps.target.outputs.prod_flag }} --token="$VERCEL_TOKEN"

      - name: Deploy Vercel output
        id: deploy
        run: |
          deployment_url="$(npx vercel deploy --prebuilt ${{ steps.target.outputs.prod_flag }} --token="$VERCEL_TOKEN")"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Deployed ${{ steps.target.outputs.name }} to $deployment_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on pull request
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: |
          gh pr comment "$PR_NUMBER" --body "Vercel preview deployed: $DEPLOYMENT_URL"
